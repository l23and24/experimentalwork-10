<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Експериментальні роботи 10-й клас (2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- MathJax for professional formula rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* Прибираємо курсив усюди */
        * {
            font-style: normal !important;
        }
        body {
            background-color: #f8fafc;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .mjx-chtml {
            color: inherit !important;
        }
        mjx-i {
            font-style: normal !important;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-900">

    <!-- Header -->
    <header class="bg-indigo-700 text-white py-12 px-4 shadow-lg mb-10">
        <div class="max-w-6xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Експериментальні роботи</h1>
            <p class="text-xl text-indigo-100 uppercase tracking-widest font-semibold text-[0.9em]">Фізика • 10-й клас • 2026</p>
            <div class="mt-6 h-1 w-24 bg-white mx-auto rounded-full"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <!-- Lab Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-16">
            
            <script>
                const labTitles = [
                    "Вимірювання похибок вимірювань",
                    "Рух тіла по колу",
                    "Дослідження рівноваги тіл",
                    "Вільне падіння тіл",
                    "Закони збереження енергії",
                    "Властивості газів (Ізопроцеси)",
                    "Вимірювання вологості повітря (с. 33)",
                    "Властивості твердих тіл",
                    "Визначення ККД установки"
                ];

                const container = document.currentScript.parentElement;

                labTitles.forEach((title, index) => {
                    const labNum = index + 1;
                    // Тепер посилання ведуть на файли в тій же папці, що і index.html
                    // Формат: instruction1.html, data1.html, ai-check1.html
                    const cardHtml = `
                        <div class="card bg-white rounded-2xl overflow-hidden border border-slate-200 flex flex-col h-full shadow-sm">
                            <div class="p-6">
                                <div class="flex items-center justify-between mb-4">
                                    <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Робота №${labNum}</span>
                                    <i class="fas fa-flask text-slate-300 text-xl"></i>
                                </div>
                                <h2 class="text-xl font-bold mb-6 text-slate-800 leading-tight h-14 overflow-hidden">
                                    ${title}
                                </h2>
                                
                                <div class="space-y-3">
                                    <a href="instruction${labNum}.html" class="flex items-center p-3 rounded-lg bg-slate-50 hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 transition-colors border border-transparent hover:border-indigo-200 group">
                                        <div class="w-8 text-center text-slate-400 group-hover:text-indigo-500"><i class="fas fa-book-open"></i></div>
                                        <span class="font-medium">Інструкція</span>
                                    </a>
                                    <a href="data${labNum}.html" class="flex items-center p-3 rounded-lg bg-slate-50 hover:bg-emerald-50 text-slate-700 hover:text-emerald-700 transition-colors border border-transparent hover:border-emerald-200 group">
                                        <div class="w-8 text-center text-slate-400 group-hover:text-emerald-500"><i class="fas fa-database"></i></div>
                                        <span class="font-medium">Вхідні дані</span>
                                    </a>
                                    <a href="ai-check${labNum}.html" class="flex items-center p-3 rounded-lg bg-slate-50 hover:bg-purple-50 text-slate-700 hover:text-purple-700 transition-colors border border-transparent hover:border-purple-200 group">
                                        <div class="w-8 text-center text-slate-400 group-hover:text-purple-500"><i class="fas fa-robot"></i></div>
                                        <span class="font-medium font-bold">AI-перевірка</span>
                                    </a>
                                </div>
                            </div>
                            <div class="mt-auto bg-slate-50 px-6 py-3 border-t border-slate-100 text-right">
                                <span class="text-[10px] text-slate-400 font-mono uppercase tracking-widest">Physics 2026 Core</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
            </script>
        </div>

        <!-- Uncertainty Appendix Link Section -->
        <section class="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-6">
                    <div class="p-4 bg-amber-50 text-amber-600 rounded-2xl">
                        <i class="fas fa-square-root-variable text-3xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Додаток: Невизначеність вимірювань</h2>
                        <p class="text-slate-500 mt-1">Методичні вказівки щодо розрахунку похибок та обробки результатів</p>
                    </div>
                </div>
                <a href="uncertainty.html" class="btn-gradient w-full md:w-auto px-8 py-4 text-white rounded-xl font-bold text-center flex items-center justify-center gap-3">
                    <span>Відкрити додаток</span>
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <div class="flex justify-center gap-6 mb-6 text-slate-400 text-xl">
                <i class="fab fa-github hover:text-indigo-600 cursor-pointer"></i>
                <i class="fas fa-university hover:text-indigo-600 cursor-pointer"></i>
                <i class="fas fa-atom hover:text-indigo-600 cursor-pointer"></i>
            </div>
            <p class="text-slate-500 mb-2 font-medium">© 2026 Експериментальні роботи з фізики</p>
            <p class="text-slate-400 text-xs uppercase tracking-widest">Digital Lab Experience • v2.0</p>
        </div>
    </footer>

</body>
</html>
